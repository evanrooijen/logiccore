name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [synchronize, opened]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache turbo output
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
          run_install: true

      - name: Install SpacetimeDB CLI
        run: curl --proto '=https' --tlsv1.2 -sSf https://install.spacetimedb.com | bash

      - name: Run linter
        run: pnpm turbo check

      - name: Run tests
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build
        env:
          DB_FILE_NAME: ${{ vars.DB_FILE_NAME }}
